---
dependency:
  name: galaxy
  options:
    role-file: requirements.yml
    requirements-file: requirements.yml
driver:
  name: default
platforms:
  - name: "${MOLECULE_SCENARIO}-${MOLECULE_PARTITION_METHOD}-${MOLECULE_PARTITION_SIZE}g"
provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_VERBOSITY: ${MOLECULE_VERBOSITY:-0}
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: ansible.posix.profile_tasks
      callback_whitelist: profile_tasks, timer, yaml
  inventory:
    group_vars:
      all:
        libvirt_network: "ubuntu"
        libvirt_platforms: "{{ molecule_yml.platforms }}"
        libvirt_address: "172.31.247.1/24"
        libvirt_path: "{{ molecule_project }}/libvirt/nephelaiio-ubuntu-installer"
        libvirt_privkey: "{{ libvirt_path }}/id_rsa"
        libvirt_guest_iso: "{{ libvirt_path }}/{{ inventory_hostname }}.iso"
        libvirt_guest_size: "{{ (molecule_partition_size | int) * (1024**3) }}"
        libvirt_guest_address: "{{ molecule_netaddr | ansible.utils.nthhost(2) }}"

        molecule_distro: "{{ lookup('env', 'MOLECULE_DISTRO') }}"
        molecule_installer_url: "{{ lookup('env', 'MOLECULE_ISO') }}"
        molecule_install_dir: "{{ lookup('env', 'MOLECULE_OUTPUT_DIR', default='/tmp/logs') }}"
        molecule_network: "{{ libvirt_address | ansible.utils.ipaddr('network') }}"
        molecule_netmask: "{{ libvirt_address | ansible.utils.ipaddr('netmask') }}"
        molecule_prefix: "{{ libvirt_address | ansible.utils.ipaddr('prefix') }}"
        molecule_netaddr: "{{ molecule_network }}/{{ molecule_prefix }}"
        molecule_project: "{{ lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') }}"
        molecule_partition_size: "{{ lookup('env', 'MOLECULE_PARTITION_SIZE') }}"
        molecule_partition_method: "{{ lookup('env', 'MOLECULE_PARTITION_METHOD') }}"
        molecule_partition_lvm: autopart
        molecule_installer_interface:
          static: true
          ipaddress: "{{ libvirt_guest_address }}"
          network: "{{ molecule_network }}"
          netmask: "{{ molecule_netmask }}"
          gateway: "{{ libvirt_address | ansible.utils.ipaddr('address') }}"
          nameservers: "{{ ubuntu_nameservers }}"

        ubuntu_installer_target_dir: "{{ libvirt_path }}"
        ubuntu_installer_dest: "{{ libvirt_path }}/server-live.iso"
        ubuntu_installer_url: "{{ molecule_installer_url }}"
        ubuntu_installer_nameservers: ["1.1.1.1", "8.8.8.8"]

verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - prepare
    - create
    - converge
    - verify
    - cleanup
